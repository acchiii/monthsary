<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karya</title>
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&display=swap" rel="stylesheet">
    <script src="js/tsparticles.bundle.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 0;

        }

        .cont {
            position: absolute;
            text-align: center; 
            padding: 0 30px;
            z-index: 2;
        }

        /* Make the button like glass */
        button {    
            margin-top: 40px; padding: 10px 20px; border-radius: 35px; border: none; background-color: #ff4081; color: white; font-size: 1.2em; cursor: pointer; font-family: 'Poppins', sans-serif;
            background: #ff4081;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            
        }
        /* glass btn hover */
        button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        button:active, button:focus {
            background: rgba(255, 255, 255, 0.2);
        }
  #hearts-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}
    </style>
</head>
<body>

    <!-- Create a background image with over about 90% darkness with a transparent overlay and a label I Love You, Love! and a description and a rounded button with 20 px margin top-->
    <div style="position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center;">
        <img src="./img/karya.jpg" alt="Background Image" style="width: 100%; height: 100%; object-fit: cover; filter: brightness(20%);">
        <div class="cont">
            <h1 style="color: white; font-size: 2.5em; font-family: 'Poppins', sans-serif; font-weight: 800;">I Love You, <span style="color: #ff4081;">Karya</span>!</h1>
            <p style="color: rgb(139, 137, 137); font-size: 1em; font-family: 'Poppins', sans-serif; transform: translateY(-30px);">Every moment with you is special. I love you more than words can explain. Cge lang baya kag pangaway anga ka. 
</p>
           <a href="karya.html"><button id="glass" >Pislita ni waa ka</button></a>
        </div>
    </div>
    <div id="hearts-bg"></div>

    <script>
tsParticles.load("hearts-bg", {
    particles: {
        number: {
            value: 60
        },
        shape: {
            type: "char",
            character: {
                value: "paku"
            }
        },
        size: {
            value: 5
        },
        color: {
            value: "#ff4d6d"
        },
        move: {
            enable: true,
            speed: 2,
            direction: "top",
            outModes: {
                default: "out"
            }
        },
        opacity: {
            value: 0.4
        }
    },
    background: {
        color: "transparent"
    }
});

function mousePressed(){

    if(document.referrer.includes("karya.html")){
        history.back();
    }else{
        window.location = "karya.html";
    }

}

window.addEventListener("click", (e) => {
    mousePressed();
});

    </script>
    
</body>
</html>
