
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAKU</title>
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="js/p5.min.js"></script>
 <script src="js/tsparticles.bundle.min.js"></script>
  
<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    font-family: 'Poppins', sans-serif;
}
canvas{
    image-rendering:pixelated;
    z-index: 2;
}
 #hearts-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}
</style>
</head>

<body>

<script>

let img;
let phrase = "ILOVEYOUKARYA";
let charIndex = 0;

let startSize = 20;
let endSize = 5;

let startStep = 20;
let endStep = 5;

let duration = 5000;
let startTime;

function preload(){
    img = loadImage("karya.jpg");
}

function setup(){
    createCanvas(windowWidth, windowHeight);

    img.resize(width, height); // scale image to screen

    img.loadPixels();
    textFont("Poppins");

    startTime = millis();
}

function draw(){

    background(0);

    let elapsed = millis() - startTime;
    let progress = constrain(elapsed / duration, 0, 1);

    // interpolate size and step
    let currentSize = lerp(startSize, endSize, progress);
    let currentStep = lerp(startStep, endStep, progress);

    textSize(currentSize);

    charIndex = 0;

    for(let y=0; y<img.height; y+=currentStep){
        for(let x=0; x<img.width; x+=currentStep){

            let index = (floor(x) + floor(y) * img.width) * 4;

            let r = img.pixels[index];
            let g = img.pixels[index+1];
            let b = img.pixels[index+2];

            fill(r,g,b);

            let char = phrase.charAt(charIndex % phrase.length);

           text(char,x,y);

            charIndex++;
        }
    }

    if(progress >= 1){
        noLoop();
    }
}

canvas.addEventListener("click", () => {
    
    window.location = "index.html";

});
</script>


 <div id="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); justify-content: center; align-items: center;">
                <div style="position: relative; width: 80%; height: 80%; display: flex; justify-content: center; align-items: center;">
                    <img id="modal-img" src="./img/karya.jpg" alt="Modal Image" style="max-width: 100%; max-height: 100%; border-radius: 10px;">
                    <button id="close-btn" style="position: absolute; top: 10px; right: 10px; background-color: transparent; border: none; color: white; font-size: 1.5em; cursor: pointer;">&times;</button>
                </div>
            </div>

            <script>
const modal = document.getElementById("modal");
const closeBtn = document.getElementById("close-btn");
closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
});
// show modal after 5 seconds
setTimeout(() => {
    modal.style.display = "none";
}, 7000);


// close modal when clicking outside the image
function mousePressed(){
    window.location = "index.html";
}


document.addEventListener("click", (e) => {
    mousePressed();
});


            </script>
             <div id="hearts-bg"></div>

    <script>
tsParticles.load("hearts-bg", {
    particles: {
        number: {
            value: 60
        },
        shape: {
            type: "char",
            character: {
                value: "❤"
            }
        },
        size: {
            value: 10
        },
        color: {
            value: "#000"
        },
        move: {
            enable: true,
            speed: 2,
            direction: "top",
            outModes: {
                default: "out"
            }
        },
        opacity: {
            value: .6
        }
    },
    background: {
        color: "transparent"
    }
});
</script>
</body>
</html>
