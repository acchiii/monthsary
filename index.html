<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAKU</title>

<script src="js/p5.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
}
canvas{
    image-rendering:pixelated;
}
</style>
</head>

<body>

<script>

let img;
let phrase = "I LOVE YOU KARYA ";
let charIndex = 0;

let startSize = 20;
let endSize = 5;

let startStep = 20;
let endStep = 5;

let duration = 5000;
let startTime;

function preload(){
    img = loadImage("img/karya.jpg");
}

function setup(){
    createCanvas(img.width, img.height);
    img.loadPixels();

    textFont("monospace");

    startTime = millis();
}

function draw(){

    background(0);

    let elapsed = millis() - startTime;
    let progress = constrain(elapsed / duration, 0, 1);

    // interpolate size and step
    let currentSize = lerp(startSize, endSize, progress);
    let currentStep = lerp(startStep, endStep, progress);

    textSize(currentSize);

    charIndex = 0;

    for(let y=0; y<img.height; y+=currentStep){
        for(let x=0; x<img.width; x+=currentStep){

            let index = (floor(x) + floor(y) * img.width) * 4;

            let r = img.pixels[index];
            let g = img.pixels[index+1];
            let b = img.pixels[index+2];

            fill(r,g,b);

            let char = phrase.charAt(charIndex % phrase.length);

            text(char,x,y);

            charIndex++;
        }
    }

    if(progress >= 1){
        noLoop();
    }
}

</script>

</body>
</html>
